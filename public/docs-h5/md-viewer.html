<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD 预览 - 文档中心</title>
  <link rel="stylesheet" href="/docs-h5/styles/variables.css?v=1.0">
  <link rel="stylesheet" href="/docs-h5/styles/base.css?v=1.0">
  <link rel="stylesheet" href="/docs-h5/styles/layout.css?v=1.0">
  <link rel="stylesheet" href="/docs-h5/styles/components.css?v=1.0">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .md-content {
      background: var(--color-bg-card);
      border-radius: var(--border-radius);
      padding: var(--spacing-xl);
    }
    .md-content h1 { font-size: 28px; margin-bottom: var(--spacing-lg); }
    .md-content h2 { font-size: 22px; margin: var(--spacing-xl) 0 var(--spacing-md); border-bottom: 1px solid var(--color-border); padding-bottom: var(--spacing-sm); }
    .md-content h3 { font-size: 18px; margin: var(--spacing-lg) 0 var(--spacing-sm); }
    .md-content p { margin: var(--spacing-md) 0; line-height: 1.7; }
    .md-content ul, .md-content ol { padding-left: var(--spacing-xl); margin: var(--spacing-md) 0; }
    .md-content li { margin: var(--spacing-xs) 0; }
    .md-content code { background: var(--color-bg-hover); padding: 2px 6px; border-radius: 4px; font-size: 14px; }
    .md-content pre { background: var(--color-bg-hover); padding: var(--spacing-md); border-radius: var(--border-radius); overflow-x: auto; margin: var(--spacing-md) 0; }
    .md-content pre code { background: none; padding: 0; }
    .md-content blockquote { border-left: 4px solid var(--color-primary); padding-left: var(--spacing-md); margin: var(--spacing-md) 0; color: var(--color-text-secondary); }
    .md-content table { width: 100%; border-collapse: collapse; margin: var(--spacing-md) 0; }
    .md-content th, .md-content td { border: 1px solid var(--color-border); padding: var(--spacing-sm) var(--spacing-md); text-align: left; }
    .md-content th { background: var(--color-bg-hover); font-weight: 600; }
    .md-content a { color: var(--color-primary); }
    .md-content hr { border: none; border-top: 1px solid var(--color-border); margin: var(--spacing-xl) 0; }
    .md-nav-back { margin-bottom: var(--spacing-lg); }
    .md-nav-back a { color: var(--color-text-secondary); text-decoration: none; font-size: 14px; }
    .md-nav-back a:hover { color: var(--color-primary); }
  </style>
</head>
<body>
  <div class="doc-layout">
    <!-- Sidebar rendered by app.js -->
    <aside class="doc-aside"></aside>

    <main class="doc-main">
      <header class="doc-header">
        <div class="doc-breadcrumb">
          <a href="/docs-h5/index.html">首页</a>
          <span>/</span>
          <span id="breadcrumb-path">MD 预览</span>
        </div>
        <div class="doc-header-actions">
          <button class="doc-btn doc-btn-ghost" id="theme-toggle">🌙</button>
        </div>
      </header>

      <div class="doc-content">
        <div class="doc-page-header">
          <h1 class="doc-page-title">📄 MD 文档预览</h1>
          <p class="doc-page-desc">Markdown 文档渲染预览</p>
        </div>

        <div class="md-nav-back" id="back-link"></div>
        <div class="md-content" id="md-content">
          <p>加载中...</p>
        </div>
      </div>

      <footer class="doc-footer">
        <span>FCK 文档中心</span>
        <span> | </span>
        <span>最后更新：2026-05-20</span>
      </footer>
    </main>
  </div>

  <script src="/docs-h5/components/app.js?v=1.0.6"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search)
    const mdPath = urlParams.get('path')

    if (mdPath) {
      // Update breadcrumb
      document.getElementById('breadcrumb-path').textContent = decodeURIComponent(mdPath.split('/').pop())

      // Show back link
      const backLink = mdPath.replace('.md', '.html')
      document.getElementById('back-link').innerHTML =
        `<a href="${backLink}">← 返回 HTML 版本</a>`

      // Fetch and render MD
      fetch(mdPath)
        .then(res => res.text())
        .then(text => {
          document.getElementById('md-content').innerHTML = marked.parse(text)
        })
        .catch(err => {
          document.getElementById('md-content').innerHTML = '<p style="color:red;">加载失败：' + err.message + '</p>'
        })
    } else {
      document.getElementById('md-content').innerHTML = '<p>请提供 MD 文件路径：<code>?path=/docs-h5/...</code></p>'
    }
  </script>
</body>
</html>
